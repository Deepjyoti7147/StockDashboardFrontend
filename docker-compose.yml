version: "3.8"
services:
  stock-dashboard:
    build: .
    container_name: stock-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # Set these to the IPs/hostnames of your backend services
      - STOCK_HOST=${STOCK_HOST:-127.0.0.1}
      - SORT_HOST=${SORT_HOST:-127.0.0.1}
      - NEWS_COLLECTOR_HOST=${NEWS_COLLECTOR_HOST:-127.0.0.1}
      - NEWS_ANALYSIS_HOST=${NEWS_ANALYSIS_HOST:-127.0.0.1}
      # Only substitute our custom vars, not nginx's $host/$uri/$remote_addr
      - NGINX_ENVSUBST_FILTER=^(STOCK_HOST|SORT_HOST|NEWS_COLLECTOR_HOST|NEWS_ANALYSIS_HOST)$
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 64m
