name: Deploy Stock Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to server via Tailscale SSH
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          STOCK_HOST: ${{ secrets.STOCK_API_HOST }}
          SORT_HOST: ${{ secrets.SORT_API_HOST }}
          NEWS_COLLECTOR_HOST: ${{ secrets.NEWS_COLLECTOR_HOST }}
          NEWS_ANALYSIS_HOST: ${{ secrets.NEWS_ANALYSIS_HOST }}
        run: |
          # Wait for Tailscale to connect
          sleep 5

          # Create project dir on remote
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} "mkdir -p ~/stock-dashboard"

          # Copy all files
          scp -o StrictHostKeyChecking=no \
            index.html index.css app.js config.js \
            Dockerfile nginx.conf.template docker-compose.yml \
            ${SERVER_USER}@${SERVER_IP}:~/stock-dashboard/

          # Write .env with backend service IPs (no leading spaces!)
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} bash -c "cat > ~/stock-dashboard/.env << 'ENVEOF'
STOCK_HOST=${STOCK_HOST}
SORT_HOST=${SORT_HOST}
NEWS_COLLECTOR_HOST=${NEWS_COLLECTOR_HOST}
NEWS_ANALYSIS_HOST=${NEWS_ANALYSIS_HOST}
ENVEOF"

          # Rebuild and restart container
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} << 'DEPLOY_EOF'
            cd ~/stock-dashboard
            docker compose down || true
            docker compose up -d --build
            echo "✅ Dashboard deployed successfully on port 3000"
          DEPLOY_EOF
