name: Deploy Stock Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to server via Tailscale SSH
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEWS_POSTGRES_DB: ${{ secrets.NEWS_POSTGRES_DB }}
        run: |
          # Wait for Tailscale to connect
          sleep 5

          # Create project dir on remote
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} "mkdir -p ~/stock-dashboard"

          # Copy all files
          scp -o StrictHostKeyChecking=no \
            index.html index.css app.js config.js \
            server.js package.json \
            Dockerfile docker-compose.yml \
            ${SERVER_USER}@${SERVER_IP}:~/stock-dashboard/

          # Write .env with database credentials
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} \
            "printf 'POSTGRES_HOST=%s\nPOSTGRES_PORT=%s\nPOSTGRES_DB=%s\nPOSTGRES_USER=%s\nPOSTGRES_PASSWORD=%s\nNEWS_POSTGRES_DB=%s\n' \
            '${POSTGRES_HOST}' '${POSTGRES_PORT:-5432}' '${POSTGRES_DB:-stockdata}' '${POSTGRES_USER:-postgres}' '${POSTGRES_PASSWORD}' '${NEWS_POSTGRES_DB:-newsdb}' \
            > ~/stock-dashboard/.env"

          # Rebuild and restart container
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_IP} << 'DEPLOY_EOF'
            cd ~/stock-dashboard
            docker compose down || true
            docker compose up -d --build
            echo "✅ Dashboard deployed successfully on port 3000"
          DEPLOY_EOF
